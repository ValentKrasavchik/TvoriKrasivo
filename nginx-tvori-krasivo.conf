# Пример nginx для продакшена: https://tvori-krasivo.ru/ (корень сайта, без /gonchar/1/)
#
# 1. Подставьте APP_ROOT — каталог клона репозитория на этом сервере, тот же что в systemd и git pull:
#    /var/www/TvoriKrasivo  или  /var/www/gonchar/1
# 2. Скопируйте в sites-available и включите symlink в sites-enabled.
# 3. Сертификаты Let's Encrypt (после настройки DNS на этот VPS):
#    sudo certbot --nginx -d tvori-krasivo.ru -d www.tvori-krasivo.ru
#    либо certbot certonly, тогда пропишите пути ssl_certificate ниже вручную.
# 4. Проверка: sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS (после появления SSL certbot может изменить этот блок)
server {
    listen 80;
    listen [::]:80;
    server_name tvori-krasivo.ru www.tvori-krasivo.ru;
    return 301 https://tvori-krasivo.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tvori-krasivo.ru www.tvori-krasivo.ru;

    # Пути после certbot (имя каталога обычно совпадает с первым -d)
    ssl_certificate     /etc/letsencrypt/live/tvori-krasivo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tvori-krasivo.ru/privkey.pem;

    client_max_body_size 20m;

    # APP_ROOT — замените при необходимости
    root /var/www/TvoriKrasivo;
    index index.html;

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/TvoriKrasivo/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
